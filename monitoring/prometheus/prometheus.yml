global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: trade-ingestion
    static_configs:
      - targets: ["trade-ingestion:8080"]

  - job_name: outbox-publisher
    static_configs:
      - targets: ["outbox-publisher:8080"]

  - job_name: netting-engine
    static_configs:
      - targets: ["netting-engine:8080"]

  - job_name: margin-engine
    static_configs:
      - targets: ["margin-engine:8080"]

  - job_name: collateral-manager
    static_configs:
      - targets: ["collateral-manager:8080"]

  - job_name: settlement-engine
    static_configs:
      - targets: ["settlement-engine:8080"]

  - job_name: liquidation-engine
    static_configs:
      - targets: ["liquidation-engine:8080"]

  - job_name: price-oracle
    static_configs:
      - targets: ["price-oracle:8080"]

  - job_name: compliance-monitor
    static_configs:
      - targets: ["compliance-monitor:8080"]

  - job_name: signing-gateway
    static_configs:
      - targets: ["signing-gateway:8010"]
